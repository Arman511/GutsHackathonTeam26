services:
  main_system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guts-system
    env_file:
      - .env
    volumes:
      - ./app_data:/app/data
    restart: unless-stopped
    networks:
      default:
        aliases:
          - guts-system

networks:
  default:
    name: zoraxy_proxy
    external: true
